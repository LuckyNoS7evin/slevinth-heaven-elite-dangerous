<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0b1a2a"></stop>
      <stop offset="100%" stop-color="#02060d"></stop>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="256" height="256" fill="url(#bg)"></rect>

  <!-- radar circle -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="#00e5ff" stroke-width="6" opacity="0.9"></circle>

  <!-- inner rings -->
  <circle cx="128" cy="128" r="60" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.5"></circle>

  <circle cx="128" cy="128" r="30" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.35"></circle>

  <!-- radar lines -->
  <line x1="128" y1="38" x2="128" y2="218" stroke="#00e5ff" stroke-width="2" opacity="0.35"></line>
  <line x1="38" y1="128" x2="218" y2="128" stroke="#00e5ff" stroke-width="2" opacity="0.35"></line>

  <!-- radar sweep -->
  <path d="M128 128 L128 40 A88 88 0 0 1 200 100 Z" fill="#00e5ff" opacity="0.18"></path>

  <!-- ship marker -->
  <polygon points="170,95 178,112 162,112" fill="#ff7a18"></polygon>

  <!-- signal dot -->
  <circle cx="170" cy="104" r="4" fill="#ff7a18"></circle>
</svg>